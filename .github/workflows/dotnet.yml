# Build, test and measure coverage for .NET project

name: .NET

on:
  push:
    branches:
      - "*"
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test (with coverage)
        run: |
          dotnet test \
            --no-build \
            --verbosity normal \
            --settings coverage.runsettings \
            --collect:"XPlat Code Coverage"

      - name: Install cloc
        run: |
          sudo apt-get update
          sudo apt-get install -y cloc

      - name: Lines of Code (production only)
        run: |
          # Count only production C# code lines
          # Excludes:
          # - TestProject (tests)
          # - bin / obj folders
          # - comments and blank lines
          LOC=$(cloc . \
            --include-lang=C# \
            --exclude-dir=bin,obj,TestProject \
            --strip-comments \
            --json \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['SUM']['code'])")

          echo "Lines of Code: $LOC"

      - name: Print coverage percentage
        run: |
          COV_FILE=$(find . -name 'coverage.cobertura.xml' | head -n 1)

          if [ -z "$COV_FILE" ]; then
            echo "No coverage file found."
            exit 1
          fi

          grep '<coverage line-rate="' "$COV_FILE" \
            | awk -F'line-rate="' '{print $2}' \
            | awk -F'"' '{printf "Test Coverage: %.2f %%\n", $1 * 100}'
