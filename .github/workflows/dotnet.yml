# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: 
      - "*"
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: |
        dotnet test --no-build --verbosity normal --settings coverage.runsettings --collect:"XPlat Code Coverage"
        apt install cloc --no-install-suggests --no-install-recommends -y
        echo "Lines of Code: "$(cloc --include-lang=C# . | awk '/SUM:/ {print $5}')
        cd TestResults
        cd $(ls -t | head -n 1)
        cloc --include-lang=C# .
        grep '<coverage line-rate="' coverage.cobertura.xml | awk -F'line-rate="' '{print $2}' | awk -F'"' '{printf "Test Coverage: %.2f %%\n", $1 * 100}'
        cd ../../../..
