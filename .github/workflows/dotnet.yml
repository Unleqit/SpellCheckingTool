# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches:
      - "*"
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: |
        dotnet test --no-build --verbosity normal --settings coverage.runsettings --collect:"XPlat Code Coverage"

        sudo apt install cloc --no-install-suggests --no-install-recommends -y

        # Production LoC only: exclude tests + bin/obj, strip comments, then print only CODE column from SUM
        echo "Lines of Code: "$(cloc --include-lang=C# . --exclude-dir=bin,obj,TestProject --strip-comments | awk '/SUM:/ {print $5}')

        # Find newest cobertura coverage file (path can differ between local/CI)
        COV_FILE=$(find . -name coverage.cobertura.xml -printf '%T@ %p\n' | sort -nr | head -n 1 | cut -d' ' -f2-)

        if [ -z "$COV_FILE" ]; then
          echo "No coverage.cobertura.xml found."
          exit 1
        fi

        grep '<coverage line-rate="' "$COV_FILE" | awk -F'line-rate="' '{print $2}' | awk -F'"' '{printf "Test Coverage: %.2f %%\n", $1 * 100}'
