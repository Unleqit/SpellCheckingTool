# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches:
      - "*"
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test (with coverage)
        run: |
          dotnet test --no-build --verbosity normal --settings coverage.runsettings --collect:"XPlat Code Coverage"

      - name: Install tools (cloc + reportgenerator)
        run: |
          sudo apt-get update
          sudo apt-get install -y cloc
          dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Lines of Code (C# only, excluding tests & comments)
        run: |
          echo "Lines of Code:"
          # exclude TestProject + build output folders, and strip comments
          cloc . \
            --include-lang=C# \
            --exclude-dir=bin,obj \
            --exclude-dir=TestProject \
            --strip-comments \
            --quiet

      - name: Print coverage percentage
        run: |
          # Find the newest cobertura file generated by XPlat Code Coverage
          COV_FILE="$(find . -name 'coverage.cobertura.xml' -print0 | xargs -0 ls -t 2>/dev/null | head -n 1)"
          echo "Using coverage file: $COV_FILE"

          if [ -z "$COV_FILE" ]; then
            echo "No coverage.cobertura.xml found."
            exit 1
          fi

          grep '<coverage line-rate="' "$COV_FILE" \
            | awk -F'line-rate="' '{print $2}' \
            | awk -F'"' '{printf "Test Coverage: %.2f %%\n", $1 * 100}'

      - name: Generate HTML coverage report (line-by-line)
        run: |
          reportgenerator \
            -reports:**/coverage.cobertura.xml \
            -targetdir:coveragereport \
            -reporttypes:Html

      - name: Upload coverage report artifact (HTML)
        uses: actions/upload-artifact@v4
        with:
          name: coveragereport
          path: coveragereport
